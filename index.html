<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>글자 따라쓰기 활동지</title>

<style>
  body {
    font-family: Arial;
    background: #f5f6fb;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .controls {
    width: 800px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  button {
    background: #ff8fab;
    color: white;
    font-weight: bold;
    border: none;
  }

  /* 📄 페이지 */
  .page {
    width: 210mm;
    height: 297mm;
    padding: 8mm;
    box-sizing: border-box;
    overflow: hidden;
  }

  /* 🔥 프린트 최적화 */
  @page {
    size: A4 portrait;
    margin: 0;
  }

  @media print {
    html, body {
      width: 210mm;
      height: 297mm;
      margin: 0;
      padding: 0;
    }

    .controls {
      display: none;
    }

    .page {
      page-break-after: avoid;
    }
  }

  /* 상단 */
  .header {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 10px;
  }

  .top {
    text-align: center;
    margin-bottom: 10px;
  }

  .top-title {
    font-size: 24px;
    font-weight: bold;
  }

  .row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }

  .box {
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-right: 4px;
  }

  .char {
    color: #bbb;
  }

  /* 🎨 테마 */

  .theme-pink {
    background: #fff0f5;
  }
  .theme-pink .top-title {
    color: #ff6b9a;
  }
  .theme-pink .box {
    border: 2px solid #ffc2d1;
  }

  .theme-dino {
    background: #f0fff4;
  }
  .theme-dino .top-title {
    color: #2f9e44;
  }
  .theme-dino .box {
    border: 2px solid #69db7c;
  }

  .theme-simple {
    background: #ffffff;
  }
  .theme-simple .top-title {
    color: #333;
  }
  .theme-simple .box {
    border: 1px solid #000;
  }
</style>
</head>

<body>

<div class="controls">
  <h2>✏️ 글자 따라쓰기 활동지</h2>

  <label>아이 이름</label>
  <input id="nameInput" placeholder="예: 박지안">

  <label>연습할 문장</label>
  <input id="textInput" placeholder="예: 사랑해">

  <label>글자 크기</label>
  <input id="fontSize" type="number" value="30">

  <label>폰트 종류</label>
  <select id="fontFamily">
    <option value="sans-serif">고딕체</option>
    <option value="serif">명조체</option>
  </select>

  <label>디자인 테마</label>
  <select id="theme">
    <option value="theme-pink">🌸 러블리</option>
    <option value="theme-dino">🦖 공룡</option>
    <option value="theme-simple">📘 심플</option>
  </select>

  <label>따라쓰기 횟수</label>
  <input id="traceCount" type="number" value="4">

  <label>빈칸 횟수</label>
  <input id="blankCount" type="number" value="6">

  <button onclick="generate()">생성</button>
  <button onclick="window.print()">PDF 저장</button>
</div>

<div id="worksheet"></div>

<script>
function generate() {
  const name = document.getElementById("nameInput").value;
  const text = document.getElementById("textInput").value;
  const fontSize = parseInt(document.getElementById("fontSize").value);
  const fontFamily = document.getElementById("fontFamily").value;
  const traceCount = parseInt(document.getElementById("traceCount").value);
  const blankCount = parseInt(document.getElementById("blankCount").value);
  const theme = document.getElementById("theme").value;

  const chars = text.split("");

  const boxSize = fontSize * 1.5;
  const rowGap = fontSize / 3;

  let html = `<div class="page ${theme}">`;

  const today = new Date().toLocaleDateString();

  // 🔥 헤더
  html += `
    <div class="header">
      <div>✍️ 글자를 따라쓰며 연습해요</div>
      <div>날짜: ${today}</div>
    </div>
  `;

  // 🌸 중앙 제목
  html += `
    <div class="top">
      <div class="top-title">🌸🌼${name}의 한글연습🌼🌸</div>
    </div>
  `;

  // 연습 문장
  html += `
    <div style="
      text-align:center;
      font-size:${fontSize + 10}px;
      font-weight:bold;
      margin-bottom:${fontSize * 1.8}px;
      font-family:${fontFamily};
    ">
      ${text}
    </div>
  `;

  // 따라쓰기
  for (let i = 0; i < traceCount; i++) {
    html += `<div class="row" style="margin-bottom:${rowGap}px;">`;

    chars.forEach(c => {
      html += `
        <div class="box" style="width:${boxSize}px;height:${boxSize}px;">
          ${c !== " " ? `
          <div class="char" style="font-size:${fontSize}px; font-family:${fontFamily}">
            ${c}
          </div>` : ""}
        </div>
      `;
    });

    html += `</div>`;
  }

  // 빈칸
  for (let i = 0; i < blankCount; i++) {
    html += `<div class="row" style="margin-bottom:${rowGap}px;">`;

    chars.forEach(() => {
      html += `<div class="box" style="width:${boxSize}px;height:${boxSize}px;"></div>`;
    });

    html += `</div>`;
  }

  html += `</div>`;

  document.getElementById("worksheet").innerHTML = html;
}
</script>

</body>
</html>
