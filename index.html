<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>글자 따라쓰기 활동지</title>

<style>
  body {
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .controls {
    width: 800px;
  }

  label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
  }

  input, select, button {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
  }

  .worksheet {
    width: 210mm;
    height: 297mm;
    padding: 15mm;
    box-sizing: border-box;
    background: white;
  }

  .top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .check-box {
    width: 25px;
    height: 25px;
    border: 1px solid black;
  }

  .title {
    text-align: center;
    margin-bottom: 20px;
    font-weight: bold;
  }

  .row {
    display: flex;
    justify-content: center; /* 🔥 가운데 정렬 */
    margin-bottom: 6px;
  }

  .box {
    border: 1px solid #000;
    display: flex;
    justify-content: center;
    align-items: flex-start; /* 🔥 글자 위쪽 정렬 */
    padding-top: 3px;
    margin-right: 3px;
  }

  .trace {
    color: #bbb;
  }

  @media print {
    .controls {
      display: none;
    }
    body {
      margin: 0;
    }
  }
</style>
</head>

<body>

<div class="controls">
  <h2>✏️ 글자 따라쓰기 활동지</h2>

  <label>연습할 문장</label>
  <input id="textInput" placeholder="예: 내사랑 박지안">

  <label>글자 크기</label>
  <input id="fontSize" type="number" value="20">

  <label>폰트 종류</label>
  <select id="fontFamily">
    <option value="sans-serif">고딕체</option>
    <option value="serif">명조체</option>
    <option value="'Nanum Pen Script', cursive">손글씨</option>
  </select>

  <label>따라쓰기 반복 횟수</label>
  <input id="traceCount" type="number" value="5">

  <label>빈칸 반복 횟수</label>
  <input id="blankCount" type="number" value="5">

  <button onclick="generate()">생성</button>
  <button onclick="window.print()">PDF 저장</button>
</div>

<div class="worksheet" id="worksheet"></div>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<script>
function generate() {
  const text = document.getElementById("textInput").value;
  const fontSize = parseInt(document.getElementById("fontSize").value);
  const fontFamily = document.getElementById("fontFamily").value;
  const traceCount = document.getElementById("traceCount").value;
  const blankCount = document.getElementById("blankCount").value;

  const chars = text.split("");

  let html = "";

  // 날짜
  const today = new Date();
  const dateStr = today.toLocaleDateString();

  html += `
    <div class="top">
      <div>날짜: ${dateStr}</div>
      <div style="display:flex; align-items:center; gap:5px;">
        확인
        <div class="check-box"></div>
      </div>
    </div>
  `;

  // 제목
  html += `<div class="title" style="font-size:${fontSize + 6}px; font-family:${fontFamily}">
    ${text}
  </div>`;

  // 네모칸 크기 자동 계산
  const boxSize = Math.min(50, 500 / chars.length);
  const finalFontSize = Math.min(fontSize, boxSize * 0.6);

  // 따라쓰기
  for (let i = 0; i < traceCount; i++) {
    html += `<div class="row">`;
    chars.forEach(c => {
      html += `<div class="box trace"
        style="
          width:${boxSize}px;
          height:${boxSize}px;
          font-size:${finalFontSize}px;
          font-family:${fontFamily};
        ">${c}</div>`;
    });
    html += `</div>`;
  }

  // 빈칸
  for (let i = 0; i < blankCount; i++) {
    html += `<div class="row">`;
    chars.forEach(() => {
      html += `<div class="box"
        style="
          width:${boxSize}px;
          height:${boxSize}px;
        "></div>`;
    });
    html += `</div>`;
  }

  document.getElementById("worksheet").innerHTML = html;
}
</script>

</body>
</html>
