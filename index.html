<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>글자 따라쓰기 활동지</title>

<style>
  body {
    font-family: Arial;
    background: #f5f6fb;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .controls {
    width: 800px;
    background: white;
    padding: 20px;
    border-radius: 15px;
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
  }

  button {
    background: #ff8fab;
    color: white;
    font-weight: bold;
    border: none;
  }

  .page {
    width: 210mm;
    height: 297mm;
    padding: 10mm;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
  }

  @page {
    size: A4 portrait;
    margin: 0;
  }

  @media print {
    .controls { display: none; }
  }

  .header {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 10px;
  }

  .top {
    text-align: center;
    margin-bottom: 10px;
  }

  .top-title {
    font-size: 24px;
    font-weight: bold;
  }

  .row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }

  .box {
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-right: 4px;
  }

  .char {
    color: #bbb;
  }

  /* 🎨 테마 */
  .theme-pink {
    background: #ffffff;
  }
  .theme-pink .top-title {
    color: #ff6b9a;
  }
  .theme-pink .box {
    border: 2px solid #ffc2d1;
  }

  .theme-dino {
    background: #ffffff;
  }
  .theme-dino .top-title {
    color: #2f9e44;
  }
  .theme-dino .box {
    border: 2px solid #69db7c;
  }

  .theme-simple {
    background: #ffffff;
  }
  .theme-simple .top-title {
    color: #333;
  }
  .theme-simple .box {
    border: 1px solid #000;
  }

  /* 🔥 하단 이모지 띠 */
  .footer {
    position: absolute;
    bottom: 5mm;
    left: 0; /* ✅ 중앙 정렬 보정 */
    width: 100%;
    text-align: center;
    font-size: 20px;
    letter-spacing: 5px;
  }
</style>
</head>

<body>

<div class="controls">
  <h2>✏️ 글자 따라쓰기 활동지</h2>

  <label>아이 이름</label>
  <input id="nameInput" placeholder="예: 박지안">

  <label>연습할 문장</label>
  <input id="textInput" placeholder="예: 사랑해">

  <label>글자 크기</label>
  <input id="fontSize" type="number" value="30">

  <label>폰트 종류</label>
  <select id="fontFamily">
    <option value="sans-serif">고딕체</option>
    <option value="serif">명조체</option>
  </select>

  <label>디자인 테마</label>
  <select id="theme">
    <option value="theme-pink">🌸 러블리</option>
    <option value="theme-dino">🦖 공룡</option>
    <option value="theme-simple">📘 심플</option>
  </select>

  <label>따라쓰기 횟수</label>
  <input id="traceCount" type="number" value="4">

  <label>빈칸 횟수</label>
  <input id="blankCount" type="number" value="6">

  <button onclick="generate()">생성</button>
  <button onclick="window.print()">PDF 저장</button>
</div>

<div id="worksheet"></div>

<script>
function generate() {
  const name = document.getElementById("nameInput").value;
  const text = document.getElementById("textInput").value;
  const fontSize = parseInt(document.getElementById("fontSize").value);
  const fontFamily = document.getElementById("fontFamily").value;
  const traceCount = parseInt(document.getElementById("traceCount").value);
  const blankCount = parseInt(document.getElementById("blankCount").value);
  const theme = document.getElementById("theme").value;

  const chars = text.split("");
  const boxSize = fontSize * 1.5;
  const rowGap = fontSize / 3;

  const today = new Date().toLocaleDateString();

  // 🎨 테마별 이모지 (하단)
  let footerEmoji = "🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼🌸🌼";
  if (theme === "theme-dino") footerEmoji = "🦖🌿🦕🌿🦖🌿🦕🌿🦖🌿🦕🌿🦖🌿🦕🌿🦕🌿🦖🌿🦕🌿🦖🌿";
  if (theme === "theme-simple") footerEmoji = "✏️📘✏️📘✏️📘✏️📘✏️📘✏️📘✏️📘✏️📘✏️📘✏️📘✏️📘✏️📘";

  // 🎨 테마별 제목 이모지
  let titleEmojiStart = "🌸🌼";
  let titleEmojiEnd = "🌼🌸";

  if (theme === "theme-dino") {
    titleEmojiStart = "🦖🌿";
    titleEmojiEnd = "🌿🦖";
  }

  if (theme === "theme-simple") {
    titleEmojiStart = "✏️📘";
    titleEmojiEnd = "📘✏️";
  }

  let html = `<div class="page ${theme}">`;

  html += `
    <div class="header">
      <div>✍️ 글자를 따라쓰며 연습해요</div>
      <div>날짜: ${today}</div>
    </div>
  `;

  html += `
    <div class="top">
      <div class="top-title">${titleEmojiStart}${name}의 한글연습${titleEmojiEnd}</div>
    </div>
    <div style="
      text-align:center;    
      margin-bottom:${fontSize * 1}px;
      font-family:${fontFamily};
    ">
    </div>
  `;

  html += `
    <div style="
      text-align:center;
      font-size:${fontSize + 10}px;
      margin-bottom:${fontSize * 0.5}px;
      font-family:${fontFamily};
    ">
      ${text}
    </div>
  `;

  // 따라쓰기
  for (let i = 0; i < traceCount; i++) {
    html += `<div class="row" style="margin-bottom:${rowGap}px;">`;

    chars.forEach(c => {
      html += `
        <div class="box" style="width:${boxSize}px;height:${boxSize}px;">
          ${c !== " " ? `<div class="char" style="font-size:${fontSize}px; font-family:${fontFamily}">${c}</div>` : ""}
        </div>
      `;
    });

    html += `</div>`;
  }

  // 빈칸
  for (let i = 0; i < blankCount; i++) {
    html += `<div class="row" style="margin-bottom:${rowGap}px;">`;

    chars.forEach(() => {
      html += `<div class="box" style="width:${boxSize}px;height:${boxSize}px;"></div>`;
    });

    html += `</div>`;
  }

  // 🔥 하단 띠
  html += `<div class="footer">${footerEmoji}</div>`;

  html += `</div>`;

  document.getElementById("worksheet").innerHTML = html;
}
</script>

</body>
</html>
