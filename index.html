<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>글자 따라쓰기 활동지</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Arial';
    background: #f7f7fb;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .controls {
    width: 800px;
    background: #fff;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
  }

  label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    background: #6c8cff;
    color: white;
    font-weight: bold;
    border: none;
  }

  .page {
    width: 210mm;
    height: 297mm;
    padding: 12mm;
    background: white;
    margin-top: 10px;
    box-sizing: border-box;
  }

  .top {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .title {
    text-align: center;
    margin-bottom: 20px;
    font-weight: bold;
  }

  .row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }

  .box {
    border: 1px solid #999;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    position: relative;
    margin-right: 4px;
  }

  .char {
    position: absolute;
    top: 4px;
  }

  .trace {
    color: #bbb;
  }

  .dotted {
    color: transparent;
    -webkit-text-stroke: 1px #999;
  }

  @page {
    size: A4 portrait;
    margin: 0;
  }

  @media print {
    .controls {
      display: none;
    }
    .page {
      page-break-after: always;
    }
  }
</style>
</head>

<body>

<div class="controls">
  <h2>✏️ 글자 따라쓰기 활동지</h2>

  <label>연습할 문장</label>
  <input id="textInput" placeholder="예: 박지안 사랑해">

  <label>글자 크기</label>
  <input id="fontSize" type="number" value="30">

  <label>폰트 종류</label>
  <select id="fontFamily">
    <option value="sans-serif">고딕체</option>
    <option value="serif">명조체</option>
    <option value="'Nanum Pen Script', cursive">손글씨</option>
  </select>

  <label>따라쓰기 횟수</label>
  <input id="traceCount" type="number" value="3">

  <label>점선 글씨 횟수</label>
  <input id="dottedCount" type="number" value="3">

  <label>빈칸 횟수</label>
  <input id="blankCount" type="number" value="5">

  <button onclick="generate()">생성</button>
  <button onclick="window.print()">PDF 저장</button>
</div>

<div id="worksheet"></div>

<script>
function generate() {
  const text = document.getElementById("textInput").value;
  const fontSize = parseInt(document.getElementById("fontSize").value);
  const fontFamily = document.getElementById("fontFamily").value;
  const traceCount = parseInt(document.getElementById("traceCount").value);
  const dottedCount = parseInt(document.getElementById("dottedCount").value);
  const blankCount = parseInt(document.getElementById("blankCount").value);

  const chars = text.split("");

  const boxSize = fontSize * 1.6;
  const rowGap = fontSize / 3;

  const usableHeight = 900;
  const rowHeight = boxSize + rowGap;
  const rowsPerPage = Math.floor(usableHeight / rowHeight);

  let rows = [];

  for (let i = 0; i < traceCount; i++) rows.push("trace");
  for (let i = 0; i < dottedCount; i++) rows.push("dotted");
  for (let i = 0; i < blankCount; i++) rows.push("blank");

  let html = "";
  const today = new Date().toLocaleDateString();

  let pageCount = Math.ceil(rows.length / rowsPerPage);

  for (let p = 0; p < pageCount; p++) {
    html += `<div class="page">`;

    html += `
      <div class="top">
        <div>✍️ 글자를 따라쓰며 연습해요</div>
        <div>날짜: ${today}</div>
      </div>
    `;

    if (p === 0) {
      html += `<div class="title" style="font-size:${fontSize+8}px; font-family:${fontFamily}">
        ${text}
      </div>`;
    }

    let pageRows = rows.slice(p * rowsPerPage, (p+1)*rowsPerPage);

    pageRows.forEach(type => {
      html += `<div class="row" style="margin-bottom:${rowGap}px;">`;

      chars.forEach(c => {
        if (c === " ") {
          html += `<div class="box" style="width:${boxSize}px;height:${boxSize}px;"></div>`;
        } else {
          let className = type === "trace" ? "trace" : type === "dotted" ? "dotted" : "";

          html += `
            <div class="box" style="width:${boxSize}px;height:${boxSize}px;">
              ${type !== "blank" ? `
              <div class="char ${className}" style="font-size:${fontSize}px; font-family:${fontFamily}">
                ${c}
              </div>` : ""}
            </div>
          `;
        }
      });

      html += `</div>`;
    });

    html += `</div>`;
  }

  document.getElementById("worksheet").innerHTML = html;
}
</script>

</body>
</html>
