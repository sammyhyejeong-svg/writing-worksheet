<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>글자 따라쓰기 활동지</title>

<style>
  body {
    font-family: Arial;
    background: #f5f6fb;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .controls {
    width: 800px;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  button {
    background: #ff8fab;
    color: white;
    font-weight: bold;
    border: none;
  }

  /* 🔥 A4 정확 설정 */
  .page {
    width: 210mm;
    height: 297mm;
    padding: 10mm;
    box-sizing: border-box;
    background: white;
    overflow: hidden; /* 🔥 넘침 방지 */
  }

  .header {
    text-align: center;
    margin-bottom: 10px;
  }

  .header-title {
    font-size: 24px;
    font-weight: bold;
  }

  .flower {
    font-size: 22px;
  }

  .top {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 10px;
  }

  .row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }

  .box {
    border: 1px solid #aaa;
    border-radius: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    margin-right: 4px;
  }

  .char {
    position: static;
    color: #bbb;
  }

  @page {
    size: A4 portrait;
    margin: 0;
  }

  @media print {
    .controls {
      display: none;
    }
    .page {
      page-break-after: avoid; /* 🔥 한 장 유지 */
    }
  }
</style>
</head>

<body>

<div class="controls">
  <h2>✏️ 글자 따라쓰기 활동지</h2>

  <label>아이 이름</label>
  <input id="nameInput" placeholder="예: 박지안">

  <label>연습할 문장</label>
  <input id="textInput" placeholder="예: 사랑해">

  <label>글자 크기</label>
  <input id="fontSize" type="number" value="30">

  <label>폰트 종류</label>
  <select id="fontFamily">
    <option value="sans-serif">고딕체</option>
    <option value="serif">명조체</option>
  </select>

  <label>따라쓰기 횟수</label>
  <input id="traceCount" type="number" value="4">

  <label>빈칸 횟수</label>
  <input id="blankCount" type="number" value="6">

  <button onclick="generate()">생성</button>
  <button onclick="window.print()">PDF 저장</button>
</div>

<div id="worksheet"></div>

<script>
function generate() {
  const name = document.getElementById("nameInput").value;
  const text = document.getElementById("textInput").value;
  const fontSize = parseInt(document.getElementById("fontSize").value);
  const fontFamily = document.getElementById("fontFamily").value;
  const traceCount = parseInt(document.getElementById("traceCount").value);
  const blankCount = parseInt(document.getElementById("blankCount").value);

  const chars = text.split("");

  const boxSize = fontSize * 1.5;
  const rowGap = fontSize / 3;

  let html = `<div class="page">`;

  const today = new Date().toLocaleDateString();


  // 상단
  html += `
    <div class="header">
      <div>✍️ 글자를 따라쓰며 연습해요</div>
      <div>날짜: ${today}</div>
    </div>
  `;

  
  
  // 🌸 헤더
  html += `
    <div class="top">
      <div class="flower","top-title">🌸🌼${name}의 한글연습🌼🌸</div>
    </div>
  `;


  
  
// 🌸 헤더 아래에 추가
html += `
  <div style="
    text-align:center;
    font-size:${fontSize + 10}px;
    font-weight:bold;
    margin-bottom:25px;
    font-family:${fontFamily};
  ">
    ${text}
  </div>
`;
  
  // 따라쓰기
  for (let i = 0; i < traceCount; i++) {
    html += `<div class="row" style="margin-bottom:${rowGap}px;">`;

    chars.forEach(c => {
      html += `
        <div class="box" style="width:${boxSize}px;height:${boxSize}px;">
          ${c !== " " ? `
          <div class="char" style="font-size:${fontSize}px; font-family:${fontFamily}">
            ${c}
          </div>` : ""}
        </div>
      `;
    });

    html += `</div>`;
  }

  // 빈칸
  for (let i = 0; i < blankCount; i++) {
    html += `<div class="row" style="margin-bottom:${rowGap}px;">`;

    chars.forEach(() => {
      html += `<div class="box" style="width:${boxSize}px;height:${boxSize}px;"></div>`;
    });

    html += `</div>`;
  }

  html += `</div>`;

  document.getElementById("worksheet").innerHTML = html;
}
</script>

</body>
</html>
