<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>글자 따라쓰기 활동지</title>

<style>
  body {
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .controls {
    width: 800px;
  }

  label {
    font-weight: bold;
    margin-top: 10px;
    display: block;
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    box-sizing: border-box; /* 🔥 폭 통일 핵심 */
  }

  .worksheet {
    width: 210mm;
    height: 297mm;
    padding: 15mm;
    box-sizing: border-box;
    background: white;
  }

  .top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    font-size: 14px;
  }

  .title {
    text-align: center;
    margin-bottom: 25px;
    font-weight: bold;
  }

  .row {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
  }

  .box {
    border: 1px solid #000;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    margin-right: 4px;
    position: relative;
  }

  .char {
    position: absolute;
    top: 2px; /* 🔥 칸 "위쪽" 위치 */
  }

  .trace {
    color: #bbb;
  }

  @media print {
    .controls {
      display: none;
    }
    body {
      margin: 0;
    }
  }
</style>
</head>

<body>

<div class="controls">
  <h2>✏️ 글자 따라쓰기 활동지</h2>

  <label>연습할 문장</label>
  <input id="textInput" placeholder="예: 박지안 내 사랑">

  <label>글자 크기</label>
  <input id="fontSize" type="number" value="30">

  <label>폰트 종류</label>
  <select id="fontFamily">
    <option value="sans-serif">고딕체</option>
    <option value="serif">명조체</option>
    <option value="'Nanum Pen Script', cursive">손글씨</option>
  </select>

  <label>따라쓰기 반복 횟수</label>
  <input id="traceCount" type="number" value="5">

  <label>빈칸 반복 횟수</label>
  <input id="blankCount" type="number" value="5">

  <button onclick="generate()">생성</button>
  <button onclick="window.print()">PDF 저장</button>
</div>

<div class="worksheet" id="worksheet"></div>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<script>
function generate() {
  const text = document.getElementById("textInput").value;
  const fontSize = parseInt(document.getElementById("fontSize").value);
  const fontFamily = document.getElementById("fontFamily").value;
  const traceCount = document.getElementById("traceCount").value;
  const blankCount = document.getElementById("blankCount").value;

  const chars = text.split("");

  let html = "";

  // 날짜
  const today = new Date();
  const dateStr = today.toLocaleDateString();

  html += `
    <div class="top">
      <div>✍️ 글자를 따라쓰며 연습해요</div>
      <div>날짜: ${dateStr}</div>
    </div>
  `;

  // 제목
  html += `<div class="title" style="font-size:${fontSize + 8}px; font-family:${fontFamily}">
    ${text}
  </div>`;

  // 🔥 핵심: 폰트 기준 박스 크기
  const boxSize = fontSize * 1.8;

  // 따라쓰기
  for (let i = 0; i < traceCount; i++) {
    html += `<div class="row">`;
    chars.forEach(c => {
      html += `
        <div class="box" style="width:${boxSize}px; height:${boxSize}px;">
          <div class="char trace"
            style="font-size:${fontSize}px; font-family:${fontFamily};">
            ${c}
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  // 빈칸
  for (let i = 0; i < blankCount; i++) {
    html += `<div class="row">`;
    chars.forEach(() => {
      html += `
        <div class="box" style="width:${boxSize}px; height:${boxSize}px;"></div>
      `;
    });
    html += `</div>`;
  }

  document.getElementById("worksheet").innerHTML = html;
}
</script>

</body>
</html>
